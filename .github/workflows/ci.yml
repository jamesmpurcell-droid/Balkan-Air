name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore BalkanAir.sln

      - name: Build
        run: dotnet build BalkanAir.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BalkanAir.sln --configuration Release --no-build --verbosity normal
