services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: balkanair-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_Pass123}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - balkanair-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: balkanair-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BalkanAir;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Pass123};TrustServerCertificate=True"
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  balkanair-sql-data:
